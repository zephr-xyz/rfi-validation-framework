// Rough classification by lat/lon for the Gulf
function classifyCountry(lat, lon) {
  // Iran: most of the northern/eastern part
  // UAE: southern coast 22-26N, 51-56.5E
  // Oman: southeast, Gulf of Oman side, and Musandam
  // Saudi: western Gulf coast
  // Qatar: peninsula
  // Kuwait/Iraq: far NW

  // Qatar peninsula
  if (lat >= 24.4 && lat <= 26.2 && lon >= 50.7 && lon <= 51.7) return 'Qatar';
  // Bahrain
  if (lat >= 25.8 && lat <= 26.3 && lon >= 50.3 && lon <= 50.7) return 'Bahrain';
  // Kuwait
  if (lat >= 28.5 && lat <= 30.1 && lon >= 46.5 && lon <= 48.5) return 'Kuwait';

  // Oman — Musandam peninsula and Gulf of Oman coast
  if (lat >= 25.8 && lat <= 26.5 && lon >= 56.0 && lon <= 56.6) return 'Oman';
  if (lat < 25.5 && lon >= 56.5) return 'Oman';
  if (lat < 24.0 && lon >= 55.5) return 'Oman';

  // UAE — southern coast
  if (lat < 25.5 && lon >= 53.5 && lon < 56.5) return 'UAE';
  if (lat < 25.0 && lon >= 51.5 && lon < 53.5) return 'UAE';
  if (lat < 24.8 && lon >= 54.0 && lon < 56.0) return 'UAE';

  // Saudi Arabia — western Gulf coast (south of Kuwait, west of Qatar)
  if (lat < 28.5 && lat > 24.0 && lon < 50.5) return 'Saudi Arabia';
  if (lat < 26.5 && lon >= 50.0 && lon < 50.7) return 'Saudi Arabia';

  // Iran — everything else in the region (northern/eastern)
  if (lat > 26.0) return 'Iran';
  if (lon > 53.0 && lat > 25.0) return 'Iran';
  if (lat > 25.5 && lon > 51.5) return 'Iran';

  // Fallback by longitude
  if (lon > 56.0) return 'Oman';
  if (lon > 53.0) return 'UAE';
  return 'Saudi Arabia';
}

function render(data) {
  const jammers = data.jammers;
  const lane = data.shipping_lane;

  // Classify jammers by country
  jammers.forEach(j => {
    j.country = classifyCountry(j.estimated_lat, j.estimated_lon);
  });

  // Count stats
  const nTotal = jammers.length;
  const nThreats = jammers.filter(j => j.impacts_shipping).length;
  const deniedPoints = new Set();
  jammers.forEach(j => {
    (j.shipping_lane_impacts || []).forEach(imp => {
      deniedPoints.add(imp.lane_lat + ',' + imp.lane_lon);
    });
  });
  const nDenied = deniedPoints.size;
  const nLane = lane.length;

  // Country breakdown
  const countryCounts = {};
  jammers.forEach(j => {
    countryCounts[j.country] = (countryCounts[j.country] || 0) + 1;
  });
  const countryThreats = {};
  jammers.filter(j => j.impacts_shipping).forEach(j => {
    countryThreats[j.country] = (countryThreats[j.country] || 0) + 1;
  });

  // Update info panel
  let countryHtml = '';
  Object.keys(countryCounts).sort((a,b) => countryCounts[b] - countryCounts[a]).forEach(c => {
    const threats = countryThreats[c] || 0;
    const color = COUNTRY_COLORS[c] || '#888';
    countryHtml += `<div class="stat" style="margin-top:2px">
      <span style="color:${color}; font-weight:600">${c}</span>: <b>${countryCounts[c]}</b> jammers`;
    if (threats > 0) countryHtml += ` <span class="threat">(${threats} threaten shipping)</span>`;
    countryHtml += `</div>`;
  });

  // Info panel will be updated after lane denial is computed
  function updateInfoPanel(deniedCnt, totalPts) {
    document.getElementById('infoPanel').innerHTML = `
      <h2>GPS Jammer Threat Assessment</h2>
      <div class="stat">Persian Gulf & Strait of Hormuz</div>
      <div class="stat">CYGNSS scan: ${data.conflict_dates[0]} to ${data.conflict_dates[data.conflict_dates.length-1]}</div>
      <div style="margin-top:10px">
        <div class="stat"><b>${nTotal}</b> jammers detected</div>
        <div class="stat threat">${nThreats} threaten shipping lanes</div>
        <div class="stat"><b>${deniedCnt}</b> / ${totalPts} lane waypoints denied GPS</div>
      </div>
      <div style="margin-top:8px; font-size:12px">
        <div style="color:#58a6ff">&#9644; IMO TSS Inbound</div>
        <div style="color:#3fb950">&#9644; IMO TSS Outbound</div>
        <div style="color:#f0883e">- - Iranian-controlled lane</div>
        <div style="color:#8b949e">&#183;&#183;&#183; Main Gulf corridor</div>
      </div>
      <div style="margin-top:10px; border-top:1px solid #30363d; padding-top:8px">
        <div style="font-weight:600; margin-bottom:4px">By Country:</div>
        ${countryHtml}
      </div>
      <div style="margin-top:10px; color:#8b949e; font-size:11px; border-top:1px solid #30363d; padding-top:8px">
        Detection: CYGNSS noise floor elevation<br>
        Localization: 1/r&sup2; inverse-distance fit<br>
        Denial model: calibrated on Bushehr GT<br>
        Baseline: ${data.baseline_date}
      </div>
    `;
  }

  // ── Accurate shipping lanes ──────────────────────────────────────────

  // Main Gulf corridor — deep water route from upper Gulf to Strait
  // Stays in navigable water: north of Qatar, between Saudi/UAE and Iran
  // Main Gulf corridor — deep water route
  // Stays in navigable water throughout. Upper Gulf channel runs between
  // Kuwait/Saudi coast (west) and Iranian coast (east).
  // Bahrain: ~26.0-26.3°N, 50.4-50.7°E. Qatar tip: ~26.15°N, 51.2°E
  const gulfCorridor = [
    [29.40, 48.75],  // Khor Abdullah — Basra/Umm Qasr approach
    [29.20, 48.90],  // south of Bubiyan Island (in water)
    [29.00, 49.15],  // Kuwait Bay approaches
    [28.75, 49.50],  // south of Kuwait, offshore
    [28.50, 49.85],  // central upper Gulf
    [28.25, 50.10],  // approaching Saudi oil coast
    [28.00, 50.35],  // off Ras Tanura / Jubail
    [27.70, 50.65],  // mid-Gulf, east of Dammam
    [27.40, 50.95],  // between Bahrain and Iran (Bahrain east coast ~50.65°E)
    [27.15, 51.25],  // north of Qatar (Qatar tip ~26.15°N, well south)
    [26.90, 51.55],  // deep water NE of Qatar
    [26.65, 51.90],  // east of Qatar, open water
    [26.50, 52.25],  // central Gulf
    [26.40, 52.60],  // heading SE
    [26.35, 53.00],  //
    [26.25, 53.40],  //
    [26.20, 53.80],  // approaching Sirri Island area
    [26.15, 54.20],  // south of Abu Musa
    [26.10, 54.60],  // approaching Strait
    [26.15, 55.00],  // west entrance to Strait
    [26.20, 55.10],  // connecting to TSS
  ];

  // Reference: Iranian "Strait of Hormuz Vessel Traffic Map" chart
  // Musandam Peninsula tip: ~26.40°N, 56.47°E (Ras Musandam)
  // Qeshm Island: ~26.52-26.95°N, 55.30-56.30°E
  // Larak Island: ~26.85°N, 56.35°E
  // Hormuz Island: ~27.06°N, 56.46°E
  // Hazardous Area box: 26°25'-26°40'N, 56°20'-56°40'E
  //
  // TSS inbound (A→B on chart): runs along north edge of hazard area
  //   ~26°40'N from 56°20'E to 56°40'E, then SE out to Gulf of Oman
  // TSS runs between Larak Island (north) and Musandam tip (south)

  // IMO TSS — INBOUND lane (into Persian Gulf)
  // Approach from Gulf of Oman heading NW, staying far east of Musandam
  // (east coast max ~56.42°E, Kumzar at 56.39°E).
  // Stay east of 56.55°E until north of 26.35°N, then turn west into TSS.
  // TSS runs at ~26.40°N from 56.40°E to 56.20°E per Iranian chart.
  const tssInbound = [
    [24.60, 58.50],  // Gulf of Oman deep water
    [24.85, 58.10],  //
    [25.10, 57.75],  //
    [25.35, 57.40],  //
    [25.60, 57.08],  //
    [25.80, 56.85],  // well east of Musandam
    [26.00, 56.72],  // still heading NW, east of peninsula
    [26.10, 56.68],  // east of Musandam (east coast at ~56.42°E here)
    [26.25, 56.65],  // staying east — Kumzar coast at 56.39°E
    [26.42, 56.62],  // now NORTH of Musandam tip (26.41°N), still east
    [26.45, 56.50],  // turning west — safely north of peninsula
    [26.42, 56.40],  // entering TSS — point B on chart
    [26.40, 56.30],  // TSS inbound lane
    [26.40, 56.20],  // point A on chart
    [26.40, 56.05],  // west of Larak, south of Qeshm tip
    [26.38, 55.85],  // exiting Strait into Gulf
    [26.35, 55.60],  //
    [26.28, 55.35],  //
    [26.20, 55.10],  // merge with Gulf corridor
  ];

  // IMO TSS — OUTBOUND lane (out of Gulf)
  // Runs south of inbound (~26.30°N through Strait),
  // exits east staying north of Musandam before heading SE
  // Outbound mirrors inbound approach: same east-of-Musandam path,
  // runs slightly south of inbound through the Strait itself.
  // Key: share the same safe waypoints east of Musandam as inbound.
  // Outbound runs NORTH of inbound (~26.45°N vs 26.40°N) through entire
  // Strait to stay clear of Musandam. Peninsula extends to ~56.0°E at 26.3°N.
  const tssOutbound = [
    [26.20, 55.10],  // from Gulf corridor
    [26.30, 55.35],  //
    [26.38, 55.60],  // climbing north before reaching Musandam
    [26.45, 55.85],  // north of peninsula's west extent
    [26.47, 56.05],  // through Strait at ~26.47°N — north of inbound
    [26.48, 56.20],  // outbound lane
    [26.48, 56.35],  //
    [26.48, 56.50],  // continuing east, north of Musandam tip (26.41°N)
    [26.50, 56.65],  // safely north and east of all Musandam land
    [26.42, 56.80],  // turning SE — lon 56.80 is well east of coast
    [26.20, 56.92],  // heading SE into Gulf of Oman
    [25.90, 57.05],  //
    [25.60, 57.20],  //
    [25.30, 57.45],  //
    [25.05, 57.75],  //
    [24.70, 58.25],  // Gulf of Oman deep water
  ];

  // Iranian-controlled lane
  // Per the Iranian chart: runs NORTH of the TSS, between southern coast
  // of Qeshm Island and Larak Island, through Iranian territorial waters.
  // Exits the Strait well north of Musandam, then curves SE.
  const iranianLane = [
    [26.20, 55.10],  // from Gulf corridor (west)
    [26.35, 55.35],  //
    [26.48, 55.60],  // heading NE toward Iranian waters
    [26.55, 55.85],  // south coast of Qeshm Island
    [26.58, 56.05],  // along Qeshm south shore
    [26.60, 56.20],  // between Qeshm and Larak — Iranian waters
    [26.62, 56.35],  // north of TSS, south of Qeshm
    [26.58, 56.50],  // past Larak Island (26.85°N, 56.35°E)
    [26.55, 56.60],  // heading SE, north of Musandam
    [26.48, 56.68],  // well north of Musandam tip
    [26.35, 56.75],  // curving south, east of peninsula
    [26.15, 56.82],  // heading SE
    [25.90, 56.95],  //
    [25.60, 57.15],  //
    [25.30, 57.42],  //
    [24.95, 57.80],  // Gulf of Oman
  ];

  // Draw Gulf corridor as wide transparent band
  L.polyline(gulfCorridor, {
    color: '#8b949e', weight: 12, opacity: 0.2,
    lineCap: 'round', lineJoin: 'round',
  }).addTo(map);
  L.polyline(gulfCorridor, {
    color: '#8b949e', weight: 2, opacity: 0.4,
    dashArray: '8,6',
  }).addTo(map).bindTooltip('Main Gulf shipping corridor', {sticky: true});

  // Draw TSS inbound
  L.polyline(tssInbound, {
    color: '#58a6ff', weight: 4, opacity: 0.9,
    lineCap: 'round', lineJoin: 'round',
  }).addTo(map).bindTooltip('IMO TSS — Inbound (into Gulf)', {sticky: true});

  // Draw TSS outbound
  L.polyline(tssOutbound, {
    color: '#3fb950', weight: 4, opacity: 0.9,
    lineCap: 'round', lineJoin: 'round',
  }).addTo(map).bindTooltip('IMO TSS — Outbound (out of Gulf)', {sticky: true});

  // Draw Iranian-controlled lane
  L.polyline(iranianLane, {
    color: '#f0883e', weight: 3.5, opacity: 0.9,
    dashArray: '10,6',
    lineCap: 'round', lineJoin: 'round',
  }).addTo(map).bindTooltip('Iranian-controlled lane', {sticky: true});

  // Labels at key waypoints
  const laneLabels = [
    [25.08, 57.80, 'Gulf of Oman\nApproach'],
    [26.35, 56.30, 'Strait of Hormuz\n(TSS lanes)'],
    [26.20, 55.10, 'TSS Junction'],
    [28.05, 50.40, 'Ras Tanura\nOil Terminal'],
    [29.90, 48.80, 'Basra / Shatt al-Arab'],
    [26.62, 56.25, 'Iranian lane\n(Qeshm-Larak gap)'],
    [26.95, 51.50, 'North of Qatar'],
  ];
  laneLabels.forEach(([lat, lon, text]) => {
    L.marker([lat, lon], {
      icon: L.divIcon({
        className: 'lane-label',
        html: `<div style="background:rgba(13,17,23,0.85);color:#8b949e;padding:2px 6px;
               border-radius:4px;font-size:10px;white-space:pre;border:1px solid #30363d;
               pointer-events:none;transform:translate(-50%,-100%)">${text}</div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 0],
      }),
      interactive: false,
    }).addTo(map);
  });

  // Compute GPS denial along all shipping routes
  const allLanePoints = [];
  function addLanePoints(coords, name) {
    coords.forEach(([lat, lon]) => allLanePoints.push({lat, lon, name}));
  }
  addLanePoints(gulfCorridor, 'Gulf corridor');
  addLanePoints(tssInbound, 'TSS Inbound');
  addLanePoints(tssOutbound, 'TSS Outbound');
  addLanePoints(iranianLane, 'Iranian lane');

  // Check each lane point against all jammer denial zones
  let deniedCount = 0;
  let totalLanePoints = allLanePoints.length;
  allLanePoints.forEach(p => {
    let isDenied = false;
    jammers.forEach(j => {
      if (!j.denial_range_km) return;
      const dlat = (p.lat - j.estimated_lat) * 111.0;
      const dlon = (p.lon - j.estimated_lon) * 111.0 * Math.cos(p.lat * Math.PI / 180);
      const dist = Math.sqrt(dlat*dlat + dlon*dlon);
      if (dist < j.denial_range_km) isDenied = true;
    });
    if (isDenied) deniedCount++;
    L.circleMarker([p.lat, p.lon], {
      radius: isDenied ? 4 : 3,
      color: isDenied ? '#f85149' : '#58a6ff',
      weight: 0,
      fillColor: isDenied ? '#f85149' : '#58a6ff',
      fillOpacity: isDenied ? 0.8 : 0.4,
    }).addTo(map).bindTooltip(
      `${p.name}<br>${isDenied ? 'GPS DENIED' : 'GPS OK'}`,
      {direction: 'top', offset: [0, -4]}
    );
  });

  // Draw jammers — denial zones first (underneath), then markers on top
  const denialGroup = L.layerGroup().addTo(map);
  const markerGroup = L.layerGroup().addTo(map);

  jammers.forEach((j, idx) => {
    const lat = j.estimated_lat;
    const lon = j.estimated_lon;
    const threats = j.impacts_shipping;
    const color = threats ? COUNTRY_COLORS[j.country] : (COUNTRY_COLORS_INLAND[j.country] || '#888');
    const denialKm = j.denial_range_km || 0;

    // Denial radius circle
    if (denialKm > 0) {
      const denialCircle = L.circle([lat, lon], {
        radius: denialKm * 1000,
        color: color,
        weight: 1.5,
        dashArray: threats ? null : '6,4',
        fillColor: color,
        fillOpacity: threats ? 0.12 : 0.05,
        interactive: false,
      });
      denialGroup.addLayer(denialCircle);
    }

    // CEP circle
    const cep = j.bootstrap_cep_km;
    if (cep && cep > 0 && cep < 30) {
      L.circle([lat, lon], {
        radius: cep * 1000,
        color: color,
        weight: 2,
        fillColor: color,
        fillOpacity: 0.15,
        dashArray: null,
        interactive: false,
      }).addTo(markerGroup);
    }

    // Jammer marker
    const markerSize = Math.max(6, Math.min(14, j.amplitude / 2000));
    const marker = L.circleMarker([lat, lon], {
      radius: markerSize,
      color: '#fff',
      weight: 2,
      fillColor: color,
      fillOpacity: 1.0,
    }).addTo(markerGroup);

    // Popup
    const cepStr = cep ? `${cep.toFixed(1)} km` : 'N/A';
    const impactStr = threats
      ? `<span class="threat-badge">THREATENS SHIPPING</span> (${j.n_lane_points_denied} lane points)`
      : `<span class="safe-badge">INLAND</span>`;

    let impactDetails = '';
    if (j.shipping_lane_impacts && j.shipping_lane_impacts.length > 0) {
      impactDetails = '<div style="margin-top:4px; font-size:11px; color:#666">';
      j.shipping_lane_impacts.forEach(imp => {
        impactDetails += `Lane point at ${imp.distance_km} km (signal: ${imp.signal_strength.toFixed(1)})<br>`;
      });
      impactDetails += '</div>';
    }

    const datesStr = (j.dates || []).join(', ') || 'N/A';

    marker.bindPopup(`
      <div class="jammer-popup">
        <div class="title" style="color:${color}">Jammer #${idx + 1} — ${j.country}</div>
        <div>${impactStr}</div>
        <div class="field">Position: <b>${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E</b></div>
        <div class="field">Amplitude: <b>${j.amplitude.toFixed(0)}</b></div>
        <div class="field">CEP: <b>${cepStr}</b></div>
        <div class="field">Denial range: <b>${denialKm.toFixed(0)} km</b></div>
        <div class="field">Elevated points: <b>${j.n_elevated_points}</b></div>
        <div class="field">Dates observed: <b>${j.n_dates || 'N/A'}</b></div>
        <div class="field" style="font-size:11px; color:#888">${datesStr}</div>
        ${impactDetails}
      </div>
    `, {maxWidth: 320});

    // Tooltip for quick ID
    marker.bindTooltip(
      `#${idx + 1} ${j.country}${threats ? ' ⚠' : ''}<br>amp=${j.amplitude.toFixed(0)}, ${denialKm.toFixed(0)}km`,
      {direction: 'top', offset: [0, -markerSize - 2], opacity: 0.95}
    );
  });

  // Update info panel with computed denial counts
  updateInfoPanel(deniedCount, totalLanePoints);

  // Fit map to jammers + lanes
  const allPoints = jammers.map(j => [j.estimated_lat, j.estimated_lon]);
  allLanePoints.forEach(p => allPoints.push([p.lat, p.lon]));
  map.fitBounds(L.latLngBounds(allPoints).pad(0.05));
}
</script>
</body>
</html>
