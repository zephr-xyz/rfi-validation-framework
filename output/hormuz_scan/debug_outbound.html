<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>body{margin:0} #map{width:100%;height:100vh}</style>
</head><body>
<div id="map"></div>
<script>
const map = L.map('map').setView([26.3, 56.5], 10);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);

// Current outbound route
const outbound = [
    [26.20, 55.10],
    [26.28, 55.35],
    [26.30, 55.60],
    [26.30, 55.85],
    [26.30, 56.05],
    [26.30, 56.20],
    [26.30, 56.30],
    [26.32, 56.40],
    [26.38, 56.50],
    [26.42, 56.62],
    [26.42, 56.68],
    [26.30, 56.80],
    [26.10, 56.88],
    [25.85, 56.98],
    [25.55, 57.15],
    [25.30, 57.40],
    [25.05, 57.75],
    [24.70, 58.25],
];

L.polyline(outbound, {color:'#3fb950', weight:4}).addTo(map);

// Mark each point with index
outbound.forEach((p, i) => {
    L.circleMarker(p, {radius:6, color:'white', fillColor:'#3fb950', fillOpacity:1, weight:2})
      .addTo(map).bindTooltip('#'+i+': '+p[0]+', '+p[1], {permanent:true, direction:'top', offset:[0,-8]});
});

// Also show inbound for reference
const inbound = [
    [26.42, 56.62],
    [26.45, 56.50],
    [26.42, 56.40],
    [26.40, 56.30],
    [26.40, 56.20],
];
L.polyline(inbound, {color:'#58a6ff', weight:4}).addTo(map);
</script></body></html>
