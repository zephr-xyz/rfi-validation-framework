<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>body{margin:0} #map{width:100%;height:100vh}</style>
</head><body>
<div id="map"></div>
<script>
const map = L.map('map').setView([26.7, 56.2], 9);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);

const iranian = [
    [26.20, 55.10],
    [26.40, 55.35],
    [26.55, 55.55],
    [26.68, 55.75],
    [26.78, 55.95],
    [26.88, 56.15],
    [26.92, 56.30],
    [26.90, 56.45],
    [26.82, 56.58],
    [26.70, 56.70],
    [26.55, 56.80],
    [26.35, 56.90],
    [26.10, 57.00],
    [25.80, 57.15],
    [25.50, 57.35],
    [25.15, 57.60],
    [24.80, 57.95],
];

L.polyline(iranian, {color:'#f0883e', weight:4, dashArray:'10,6'}).addTo(map);
iranian.forEach((p, i) => {
    L.circleMarker(p, {radius:5, color:'white', fillColor:'#f0883e', fillOpacity:1, weight:2})
      .addTo(map).bindTooltip('#'+i+': '+p[0].toFixed(2)+', '+p[1].toFixed(2), {permanent:true, direction:'top', offset:[0,-8], className:'debug-label'});
});

// Mark key islands
[[26.85, 56.35, 'LARAK'], [27.06, 56.46, 'HORMUZ']].forEach(([lat,lon,name]) => {
    L.marker([lat,lon], {icon: L.divIcon({html:'<b style="color:yellow;font-size:14px;text-shadow:1px 1px black">'+name+'</b>', iconSize:[0,0]})}).addTo(map);
});
</script></body></html>
